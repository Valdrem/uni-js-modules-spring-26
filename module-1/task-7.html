<!DOCTYPE html>
<html>
<body>

    <h1>Dice Roller</h1>
    <p></p>

    <script>
        var diceRolls = parseInt(prompt("How many times should I roll the dice?"));

        var diceRsList = [];

        for (var dr = 0; dr < diceRolls; dr++) {
            var diceRs = Math.floor(Math.random() * 6) + 1;
            diceRsList.push(diceRs);
         }

        var totalSum = diceRsList.reduce(function(a, b) {return a + b;}, 0);

        document.querySelector("p").textContent = "The total sum of all dice rolls is: " + totalSum;
    </script>

</body>
</html>
