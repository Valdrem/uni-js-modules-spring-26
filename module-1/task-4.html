<!DOCTYPE html>
<html>
<body>

    <h1></h1>
    <p></p>

    <script>
        var name = prompt("Tell me your name!");

        var randNmbr = Math.floor(Math.random() * 4) + 1;
        console.log("The random number is: " + randNmbr);

        if (randNmbr === 1) {
            var classRoom = "Gryffindor"
        } else if (randNmbr === 2) {
            var classRoom = "Slytherin"
        } else if (randNmbr === 3) {
            var classRoom = "Hufflepuff"
        } else {
            var classRoom = "Ravenclaw"
        }

        document.querySelector("h1").textContent = "Welcome, " + name + "!";
        document.querySelector("p").textContent = "You have been assigned into " + classRoom + "!";
    </script>

</body>
</html>
