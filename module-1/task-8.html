<!DOCTYPE html>
<html>
<body>

    <h1>Leap Years List</h1>
    <ul></ul>

    <script>
        var startYear = parseInt(prompt("Enter start year!"));
        var endYear = parseInt(prompt("Enter end year!"));

        var manyYears = endYear - startYear + 1;

        for (var yr = 0; yr < manyYears; yr++) {
            var year = startYear + yr;

            if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
                document.querySelector("ul").innerHTML += "<li>" + year + "</li>";
            }
        }
    </script>

</body>
</html>
