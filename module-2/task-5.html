<!DOCTYPE html>
<html>
<body>

    <h1>Numbers</h1>

    <script>
        let number = parseInt(prompt("Enter one number!"));

        let numbers = [];
        numbers.push(number);

        while (true) {
            number = parseInt(prompt("Enter one number again!"));
            if (numbers.includes(number)) {
                break;
            }
            numbers.push(number);
        }

        numbers.sort((a, b) => a - b);
        console.log(numbers);
    </script>

</body>
</html>
