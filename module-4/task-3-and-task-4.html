<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TV show search</h1>
    <form id="search-form" action="https://api.tvmaze.com/search/shows">
        <input id="query" name="q" type="text">
        <input type="submit" value="Search">
    </form>

    <div id="results">
    </div>

    <script>
        const search_show = document.querySelector("#search-form");

        search_show.addEventListener('submit', async function(event){
            event.preventDefault();

            const show_name_qr = document.querySelector("#query").value;
            const response = await fetch(`https://api.tvmaze.com/search/shows?q=${show_name_qr}`);
            const show_list = await response.json();

            console.log(show_list);
            console.log(show_list[0].show.name);

            document.getElementById("results").innerHTML ="";

            //document.getElementById("show-name").textContent = show_list[0].show.name;
            //document.getElementById("show-url").textContent = show_list[0].show.url;
            //document.getElementById("show-url").href = show_list[0].show.url;
            //document.getElementById("show-image").src = show_list[0].show.image.medium;

            for (let s of show_list) {
                const article = document.createElement("article");

                article.innerHTML = `<h2>${s.show.name}</h2>`;
                if (s.show.image != null) {
                    article.innerHTML += `<img src="${s.show.image.medium}" alt="${s.show.name}"></img>`;
                }else {
                    article.innerHTML += `<img src="https://placehold.co/210x295?text=Not%20Found" alt="Not Found"></img>`;
                }
                article.innerHTML += `<div>${s.show.summary}</div>`;
                article.innerHTML += `<a href="${s.show.url}" target="_blank">View Details</a>`;

                document.getElementById("results").appendChild(article);
            }
        });
    </script>
</body>
</html>
