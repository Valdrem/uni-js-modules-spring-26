<!DOCTYPE html>
<html>
<body>

    <h1>TV series search</h1>
    <form id="search-form" action="https://api.tvmaze.com/search/shows">
        <input id="query" name="q" type="text">
        <input type="submit" value="Search">
    </form>

    <script>
        const tv_show = document.querySelector("#search-form");

        tv_show.addEventListener('submit', async function(event){
            event.preventDefault();

            const show_name_qr = document.querySelector("#query").value;
            const response = await fetch(`https://api.tvmaze.com/search/shows?q=${show_name_qr}`);
            const result = await response.json();

            console.log(result);
            console.log(result[0].show.name);
        });
    </script>

</body>
</html>
